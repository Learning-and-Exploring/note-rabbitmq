services:
  auth-service:
    command: sh -c "npx prisma db push && npm run dev"
    environment:
      NODE_ENV: development
      ACCESS_TOKEN_SECRET: super_secret_access_key_change_me
      ACCESS_TOKEN_TTL_SECONDS: 900
      REFRESH_TOKEN_TTL_DAYS: 7
      EMAIL_OTP_TTL_MINUTES: 5
      EMAIL_OTP_RESEND_COOLDOWN_SECONDS: 60
      EMAIL_OTP_MAX_ATTEMPTS: 5
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-nupheaoeun@gmail.com}
      SMTP_PASS: ${SMTP_PASS:?SMTP_PASS is required}
      SMTP_FROM: ${SMTP_FROM:-nupheaoeun@gmail.com}
    volumes:
      - ./auth-service:/app
      - /app/node_modules

  user-service:
    command: sh -c "npx prisma db push && npm run dev"
    environment:
      NODE_ENV: development
    volumes:
      - ./user-service:/app
      - /app/node_modules

  note-service:
    command: sh -c "npx prisma db push && npm run dev"
    environment:
      NODE_ENV: development
    volumes:
      - ./note-service:/app
      - /app/node_modules

  api-gateway:
    command: npm run dev
    environment:
      NODE_ENV: development
      NOTE_SERVICE_URL: http://note-service:3003
      ACCESS_TOKEN_SECRET: super_secret_access_key_change_me
      TRUST_PROXY: 1
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX: 60
      AUTH_RATE_LIMIT_WINDOW_MS: 600000
      AUTH_RATE_LIMIT_MAX: 20
    depends_on:
      - note-service
    volumes:
      - ./api-gateway:/app
      - /app/node_modules
