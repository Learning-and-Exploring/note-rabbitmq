upstream api_gateway_upstream {
    server note-rabbitmq-api-gateway-1:3000;
    server note-rabbitmq-api-gateway-2:3000;
    server note-rabbitmq-api-gateway-3:3000;
}

server {
    listen 80;
    server_name _;

    location /api/ {
        proxy_pass http://api_gateway_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        return 200 'edge-nginx is up. Use /api/*';
        add_header Content-Type text/plain;
    }
}
