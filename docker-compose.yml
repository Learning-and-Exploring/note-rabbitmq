services:

  # ─── Message Broker ────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    ports:
      - '5672:5672'     # AMQP protocol
      - '15672:15672'   # Management UI → http://localhost:15672
    environment:
      TZ: Asia/Phnom_Penh
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - microservices-net

  # ─── Shared PostgreSQL (all service DBs in one container) ─────────────────
  postgres-db:
    image: postgres:16-alpine
    container_name: postgres-db
    environment:
      TZ: Asia/Phnom_Penh
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    ports:
      - '5433:5432'   # host:5433 to avoid conflicts with local postgres on 5432
    volumes:
      - postgres-db-data:/var/lib/postgresql/data
      - ./docker/postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - microservices-net

  # ─── Auth Service ──────────────────────────────────────────────────────────
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - '3001:3001'
    environment:
      TZ: Asia/Phnom_Penh
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://postgres:password@postgres-db:5432/auth_service_db?schema=public
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      ACCESS_TOKEN_SECRET: super_secret_access_key_change_me
      ACCESS_TOKEN_TTL_SECONDS: 900
      REFRESH_TOKEN_TTL_DAYS: 7
      EMAIL_OTP_TTL_MINUTES: 5
      EMAIL_OTP_RESEND_COOLDOWN_SECONDS: 60
      EMAIL_OTP_MAX_ATTEMPTS: 5
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-nupheaoeun@gmail.com}
      SMTP_PASS: ${SMTP_PASS:?SMTP_PASS is required}
      SMTP_FROM: ${SMTP_FROM:-nupheaoeun@gmail.com}
    depends_on:
      postgres-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - microservices-net

  # ─── Note Service ──────────────────────────────────────────────────────────
  note-service:
    build:
      context: ./note-service
      dockerfile: Dockerfile
    container_name: note-service
    ports:
      - '3003:3003'
    environment:
      TZ: Asia/Phnom_Penh
      NODE_ENV: production
      PORT: 3003
      DATABASE_URL: postgresql://postgres:password@postgres-db:5432/note_service_db?schema=public
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    depends_on:
      postgres-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - microservices-net

  # ─── User Service ──────────────────────────────────────────────────────────
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service
    ports:
      - '3002:3002'
    environment:
      TZ: Asia/Phnom_Penh
      NODE_ENV: production
      PORT: 3002
      DATABASE_URL: postgresql://postgres:password@postgres-db:5432/user_service_db?schema=public
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      AUTH_SERVICE_URL: http://auth-service:3001
      ACCESS_TOKEN_SECRET: super_secret_access_key_change_me
    depends_on:
      postgres-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - microservices-net

  # ─── API Gateway ───────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - '3000:3000'
    environment:
      TZ: Asia/Phnom_Penh
      NODE_ENV: production
      PORT: 3000
      AUTH_SERVICE_URL: http://auth-service:3001
      USER_SERVICE_URL: http://user-service:3002
      NOTE_SERVICE_URL: http://note-service:3003
      ACCESS_TOKEN_SECRET: super_secret_access_key_change_me
    depends_on:
      - auth-service
      - note-service
      - user-service
    networks:
      - microservices-net

volumes:
  postgres-db-data:

networks:
  microservices-net:
    driver: bridge
